syntax = "proto3";

package access;

import "google/protobuf/empty.proto";
import "common.proto";

option java_multiple_files = true;
option java_package = "ru.mentor.access.grpc";
option java_outer_classname = "AccessProto";

service AccessService {

  rpc GrantCourseAccess (GrantCourseAccessRequest)
      returns (google.protobuf.Empty);

  rpc RevokeCourseAccess (RevokeCourseAccessRequest)
      returns (google.protobuf.Empty);

  rpc HasCourseAccess (HasCourseAccessRequest)
      returns (HasAccessResponse);

  rpc GrantModuleAccess (GrantModuleAccessRequest)
      returns (google.protobuf.Empty);

  rpc RevokeModuleAccess (RevokeModuleAccessRequest)
      returns (google.protobuf.Empty);

  rpc HasModuleAccess (HasModuleAccessRequest)
      returns (HasAccessResponse);
}

message GrantCourseAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
}

message RevokeCourseAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
}

message HasCourseAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
}

message GrantModuleAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
  uint64 module_id = 4;
}

message RevokeModuleAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
  uint64 module_id = 4;
}

message HasModuleAccessRequest {
  Header header = 1;
  uint64 user_id = 2;
  uint64 course_id = 3;
  uint64 module_id = 4;
}

message HasAccessResponse {
  bool has_access = 1;
}