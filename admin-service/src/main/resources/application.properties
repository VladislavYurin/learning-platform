spring.main.web-application-type=none

#DataSource
spring.r2dbc.host=${DB_HOST:localhost}
spring.r2dbc.port=${DB_PORT:5432}
spring.r2dbc.database=${DB_NAME:mentor}
spring.r2dbc.username=${DB_USERNAME:user}
spring.r2dbc.password=${DB_PASSWORD:psw}
spring.r2dbc.url=r2dbc:postgresql://${spring.r2dbc.host}:${spring.r2dbc.port}/${spring.r2dbc.database}

# WebFlux server configuration (Netty)
server.port=8085
server.netty.max-initial-line-length=8192
server.netty.max-header-size=8192

# gRPC server configuration
grpc.server.port=1085
grpc.server.security.enabled=false

# Отключаем SpringDoc
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false