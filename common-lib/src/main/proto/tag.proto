syntax = "proto3";

package ru.mentor.tags.v1;

option java_multiple_files = true;
option java_package = "ru.mentor.grpc.tags";
option java_outer_classname = "TagsProto";

import "google/protobuf/timestamp.proto";

/**
 * Пустое сообщение-заглушка.
 * Используется в методах, где не требуется входных параметров.
 */
message Empty{}

/**
 * Сообщение, описывающее сущность тега.
 */
message Tag {
  /** Уникальный идентификатор тега */
  int64 id = 1;
  /** Название тега */
  string name = 2;
  /** Дата и время создания тега */
  google.protobuf.Timestamp created_at = 3;
  /** Флаг активности тега */
  bool is_active = 4;
}

/**
 * Ответ на запрос получения всех тегов.
 * Содержит список объектов {@link Tag}.
 */
message ListTagsResponse {
  /** Список тегов */
  repeated Tag tags = 1;
}

/**
 * gRPC-сервис для работы с тегами.
 */
service TagsService {
  /**
 * Возвращает список всех тегов.
 *
 * @param Empty пустой запрос
 * @return ListTagsResponse список тегов
 */
  rpc ListTags(Empty) returns (ListTagsResponse);
}