syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "ru.mentor.admin";
option java_multiple_files = true;

service UserInfoService {
  rpc getUserInfoByUserId(UserByIdRequest) returns (UserByIdResponse);
}

message UserByIdRequest {
  int64 id = 1;
}

message UserByIdResponse {
  int64 id = 1;
  string username = 2;
  Role role = 3;
  string firstName = 4;
  string lastName = 5;
  string tgNickname = 6;
  int64 tgChatId = 7;
}

enum Role {
  USER = 0;
  ADMIN = 1;
  MENTOR = 2;
}