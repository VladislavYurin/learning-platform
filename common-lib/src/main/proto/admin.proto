syntax = "proto3";

import "common.proto";
import "course.proto";
import "time_slot.proto";
import "module.proto";
import "mentor_tags.proto";

option java_multiple_files = true;
option java_package = "ru.mentor.admin";
option java_outer_classname = "AdminProto";

// Сервис для админских запросов по курсам
service AdminCourseService {

  // Получить курс по ID
  rpc GetCourse (GetCourseRequest) returns (CourseResponse);

  // Получить все курсы
  rpc GetAllCourses (GrpcPageRequest) returns (AllCoursesResponse);

}

// Сервис для админских запросов по слотам
service AdminCalendarService {

  // Получить все слоты
  rpc GetAllTimeSlots (GrpcPageRequest) returns (AllTimeSlotsResponse);

}

// Сервис для админских запросов по модулям
service AdminModuleService {

  // Получить модуль по ID
  rpc GetModule (GetModuleRequest) returns (ModuleResponse);

  // Получить все модули курса
  rpc GetAllModules (GrpcPageRequest) returns (AllModulesResponse);

}

// Сервис для админских запросов к тэгам ментора
service AdminMentorService {
  //Создать кастомный тэг
  rpc CreateCustomMentorTag (CreateCustomMentorTagRequest) returns (MentorTagResponse);

  // Получить полный справочник тегов
  rpc ListMentorTags (AllMentorTagsRequset) returns (AllMentorTagsResponse);

  // Привязать теги к ментору
  rpc AttachMentorTags (AttachMentorTagsRequest) returns (AttachMentorTagsResponse);

  // Отвязать тег от ментора
  rpc DetachMentorTag (DetachMentorTagRequest) returns (DetachMentorTagResponse);
}