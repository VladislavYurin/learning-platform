services:
  common-lib:
    profiles:
      - lib.build
    build:
      context: .
      dockerfile: ./reactive-common-lib/Dockerfile
    image: mentor/common-lib:local

  api-gateway-migrations:
    image: mentor/api-gateway:local
    env_file:
      - .env.docker.example
    command: >
      --spring.main.web-application-type=none
      --spring.liquibase.enabled=true
      --spring.sql.init.mode=never
    depends_on:
      database:
        condition: service_healthy
    restart: no
    networks:
      - backend

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    env_file:
      - .env.docker.example
    container_name: api-gateway
    image: mentor/api-gateway:local
    ports:
      - "8080:8080"
    networks:
      - public
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  course-service:
    build:
      context: .
      dockerfile: ./course-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: course-service
    image: mentor/course-service:local
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  mentor-service:
    build:
      context: .
      dockerfile: ./mentor-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: mentor-service
    image: mentor/mentor-service:local
    ports:
      - "8082:8082"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: notification-service
    image: mentor/notification-service:local
    ports:
      - "8083:8083"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  calendar-service:
    build:
      context: .
      dockerfile: ./calendar-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: calendar-service
    image: mentor/calendar-service:local
    ports:
      - "8084:8084"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  admin-service:
    build:
      context: .
      dockerfile: ./admin-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: admin-service
    image: mentor/admin-service:local
    ports:
      - "8085:8085"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  database:
    container_name: mentor-database
    image: postgres:15.3-alpine
    env_file:
      - .env.docker.example
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    ports:
      - "5432:5432"
    volumes:
      - mentor-database:/var/lib/postgres/data
    networks:
      - backend

  kafka-1:
    env_file:
      - .env.docker.example
    image: apache/kafka:3.9.1
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-1:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "9092:9092"
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8086:8080"
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka-1:9092
    networks:
      - public
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy

volumes:
  mentor-database:
    name: mentor-database

networks:
  backend:
    name: backend
    driver: bridge
  public:
    name: public
    driver: bridge
