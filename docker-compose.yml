version: "3.8"

networks:
  backend:

services:

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: api-gateway
    environment:
      ADMIN_COURSE_GRPC_CLIENT: static://admin-service:1085
      ADMIN_MODULE_GRPC_CLIENT: static://admin-service:1085
      ADMIN_CALENDAR_GRPC_CLIENT: static://admin-service:1085
    container_name: api-gateway
    image: mentor/api-gateway:local
    ports:
      - "8080:8080"
    networks:
      - backend

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: course-service
    container_name: course-service
    image: mentor/course-service:local
    ports:
      - "8081:8081"
    networks:
      - backend

  mentor-service:
    build:
      context: ./mentor-service
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: mentor-service
    container_name: mentor-service
    image: mentor/mentor-service:local
    ports:
      - "8082:8082"
    networks:
      - backend

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: notification-service
    container_name: notification-service
    image: mentor/notification-service:local
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092
    networks:
      - backend

  calendar-service:
    build:
      context: ./calendar-service
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: calendar-service
    container_name: calendar-service
    image: mentor/calendar-service:local
    ports:
      - "8084:8084"
    networks:
      - backend

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
      args:
        JAVA_IMAGE: openjdk:21
        VERSION: 1.0-SNAPSHOT
        NAME: admin-service
    environment:
      DB_HOST: database
    container_name: admin-service
    image: mentor/admin-service:local
    ports:
      - "8085:8085"
    networks:
      - backend

  database:
    container_name: mentor-database
    image: postgres:15.3-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: psw
      POSTGRES_DB: mentor
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - backend


  kafka-1:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data_1:/tmp/kafka-data
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8086:8080"
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka-1:9092
    networks:
      - backend
    depends_on:
      - kafka-1

volumes:
  kafka_data_1:
  database_data: