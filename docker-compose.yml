version: "3.8"

networks:
  backend:

services:
  
  api-gateway:
    container_name: api-gateway
    image: mentor/api-gateway:local
    ports:
      - "8080:8080"
    networks:
      - backend

  course-service:
    container_name: course-service
    image: mentor/course-service:local
    ports:
      - "8081:8081"
    networks:
      - backend

  mentor-service:
    container_name: mentor-service
    image: mentor/mentor-service:local
    ports:
      - "8082:8082"
    networks:
      - backend

  notification-service:
    container_name: notification-service
    image: mentor/notification-service:local
    ports:
      - "8083:8083"
    networks:
      - backend

  calendar-service:
    container_name: calendar-service
    image: mentor/calendar-service:local
    ports:
      - "8084:8084"
    networks:
      - backend

  database:
    container_name: mentor-database
    image: postgres:15.3-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: psw
      POSTGRES_DB: mentor
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    networks:
      - backend


  kafka-1:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=PVjHlx7ESeesq55jeB6Efw
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9090,EXTERNAL://${HOSTNAME:-localhost}:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka_data_1:/tmp/kafka-data
    networks:
      - backend
volumes:
  kafka_data_1:
