services:

  api-gateway-migrations:
    image: mentor/api-gateway:local
    env_file:
      - .env.docker.example
    command: >
      --spring.main.web-application-type=none
      --spring.liquibase.enabled=true
      --spring.sql.init.mode=never
    depends_on:
      database:
        condition: service_healthy
    restart: no
    networks:
      - backend

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    env_file:
      - .env.docker.example
    container_name: api-gateway
    image: mentor/api-gateway:local
    ports:
      - "8080:8080"
    networks:
      - public
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  course-service:
    build:
      context: .
      dockerfile: ./course-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: course-service
    image: mentor/course-service:local
    expose:
      - "8081"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  mentor-service:
    build:
      context: .
      dockerfile: ./mentor-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: mentor-service
    image: mentor/mentor-service:local
    expose:
      - "8082"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: notification-service
    image: mentor/notification-service:local
    expose:
      - "8083"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  calendar-service:
    build:
      context: .
      dockerfile: ./calendar-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: calendar-service
    image: mentor/calendar-service:local
    expose:
      - "8084"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  admin-service:
    build:
      context: .
      dockerfile: ./admin-service/Dockerfile
    env_file:
      - .env.docker.example
    container_name: admin-service
    image: mentor/admin-service:local
    expose:
      - "8085"
    networks:
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy
      database:
        condition: service_healthy
      api-gateway-migrations:
        condition: service_completed_successfully

  database:
    container_name: mentor-database
    image: postgres:15.3-alpine
    env_file:
      - .env.docker.example
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    expose:
      - "5432"
    volumes:
      - mentor-database:/var/lib/postgres/data
    networks:
      - backend

  kafka-1:
    env_file:
      - .env.docker.example
    image: apache/kafka:3.9.1
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-1:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    expose:
      - "9092"
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    expose:
      - "8080"
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka-1:9092
    networks:
      - public
      - backend
    depends_on:
      kafka-1:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: minio
    env_file:
      - .env.docker.example
    command: server /data --console-address ":9999"
    expose:
      - "9000"
      - "9999"
    volumes:
      - minio-data:/data
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    volumes:
      - ./api-gateway/src/main/resources/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    expose:
      - "3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      - prometheus
volumes:
  mentor-database:
    name: mentor-database
  minio-data:
    name: minio-data
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data

networks:
  backend:
    name: backend
    driver: bridge
  public:
    name: public
    driver: bridge
