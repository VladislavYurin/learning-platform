version: "3.8"

networks:
  backend:

services:
  
  api-gateway:
    container_name: api-gateway
    image: mentor/api-gateway:local
    ports:
      - "8080:8080"
    networks:
      - backend

  course-service:
    container_name: course-service
    image: mentor/course-service:local
    ports:
      - "8081:8081"
    networks:
      - backend

  mentor-service:
    container_name: mentor-service
    image: mentor/mentor-service:local
    ports:
      - "8082:8082"
    networks:
      - backend

  notification-service:
    container_name: notification-service
    image: mentor/notification-service:local
    ports:
      - "8083:8083"
    networks:
      - backend

  calendar-service:
    container_name: calendar-service
    image: mentor/calendar-service:local
    ports:
      - "8084:8084"
    networks:
      - backend

  admin-service:
    container_name: admin-service
    image: mentor/admin-service:local
    ports:
      - "8085:8085"
    networks:
      - backend

  database:
    container_name: mentor-database
    image: postgres:15.3-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: psw
      POSTGRES_DB: mentor
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    networks:
      - backend

  kafka-1:
    image: apache/kafka:3.7.1
    ports:
      - "9090:9090"
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - CLUSTER_ID=PVjHlx7ESeesq55jeB6Efw
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091
      - KAFKA_LISTENERS=PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9090,EXTERNAL://kafka-1:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    #  - KAFKA_CFG_LOG4J_LOG_LEVEL=DEBUG
    volumes:
      - kafka_data_1:/tmp/kafka-data
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8086:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=dev-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka-1:9090
      - KAFKA_LISTENER_BOOTSTRAP_SERVERS=kafka-1:9090
    #  - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - backend

volumes:
  kafka_data_1: